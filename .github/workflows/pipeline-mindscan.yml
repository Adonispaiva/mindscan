name: CI MindScan

on:
  push:
    branches:
      - main
      - principal
  pull_request:
    branches:
      - main
      - principal

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependências do frontend
        run: |
          cd front-end
          npm install
        shell: bash

      - name: Build do frontend
        run: |
          cd front-end
          npm run build || echo "Build frontend falhou, ignorando para testes iniciais"
        shell: bash

      - name: Instalar dependências do backend
        run: |
          cd backend
          python -m venv venv
          source venv/Scripts/activate
          pip install -r requirements.txt
        shell: bash

      - name: Validação do backend
        run: |
          cd backend
          python -m unittest discover tests || echo "Testes falharam, continue para debug"
        shell: bash

      - name: Empacotar projeto para deploy
        run: |
          mkdir release
          cp -r front-end backend README_dev.md release/
          powershell Compress-Archive -Path release/* -DestinationPath mindscan_build.zip

      - name: Publicar artefato
        uses: actions/upload-artifact@v3
        with:
          name: mindscan-build
          path: mindscan_build.zip
