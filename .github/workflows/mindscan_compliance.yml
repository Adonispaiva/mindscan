name: MindScan Compliance
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci || npm i
      - name: guard:exports
        env:
          GUARD_BASE: "origin/${{ github.base_ref }}"
        run: npm run guard:exports
      - name: guard:paths
        env:
          GITHUB_BASE_REF: "${{ github.base_ref }}"
        run: npm run guard:paths
      - name: guard:workplan
        env:
          GITHUB_BASE_REF: "${{ github.base_ref }}"
        run: npm run guard:workplan
      - name: guard:envelope
        env:
          GITHUB_PR_BODY: "${{ github.event.pull_request.body }}"
        run: npm run guard:envelope
