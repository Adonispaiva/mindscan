version: "3.9"

services:
  api:
    build: .
    container_name: mindscan-api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    container_name: mindscan-db
    environment:
      POSTGRES_USER: mindscan
      POSTGRES_PASSWORD: mindscan
      POSTGRES_DB: mindscan
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: mindscan-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
