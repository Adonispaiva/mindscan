version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mindscan-backend
    command: bash -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    volumes:
      - ./backend:/app
    working_dir: /app

  db:
    image: postgres:15
    container_name: mindscan-postgres
    restart: always
    environment:
      POSTGRES_DB: mindscan_db
      POSTGRES_USER: mindscan_user
      POSTGRES_PASSWORD: mindscan_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindscan_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: mindscan_postgres_data
