version: "3.9"

name: mindscan-prod

services:
  mindscan-api:
    container_name: mindscan-api
    build:
      context: .
      dockerfile: infra/Dockerfile
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENV=production
      - LOG_LEVEL=info
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./logs:/app/logs
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  postgres:
    image: postgres:16
    container_name: mindscan-db
    restart: always
    environment:
      POSTGRES_DB: mindscan
      POSTGRES_USER: ${POSTGRES_USER:-mindadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindpass}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27
    container_name: mindscan-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - mindscan-api
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  db_data:
    name: mindscan_db_data
