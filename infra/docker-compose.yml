services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: mindscan-backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: mindscan-frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev

  db:
    image: postgres:15
    container_name: mindscan-db
    environment:
      POSTGRES_DB: mindscan
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
