services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mindscan
      POSTGRES_PASSWORD: mindscan
      POSTGRES_DB: mindscan
    ports: ["5432:5432"]
    volumes:
      - ./.volumes/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api:
    build:
      context: ../../services/api
    env_file:
      - ../../services/api/.env.example
    ports: ["8000:8000"]
    depends_on: [db, redis]
    volumes:
      - ../../services/api/app:/app/app
