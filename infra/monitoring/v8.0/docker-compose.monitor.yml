name: inovexa-monitoring

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    networks:
      - ${NETWORK_NAME}

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ${NETWORK_NAME}

  monitor-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${MONITOR_AGENT_NAME}
    restart: unless-stopped
    ports:
      - "${MONITOR_AGENT_PORT}:8000"
    environment:
      - PROMETHEUS_URL=http://prometheus:${PROMETHEUS_PORT}
      - GRAFANA_URL=http://grafana:${GRAFANA_PORT}
      - MONITOR_AGENT_ENV=${MONITOR_AGENT_ENV}
    volumes:
      - ./grafana_provision_omni.py:/app/grafana_provision_omni.py
    networks:
      - ${NETWORK_NAME}
    depends_on:
      - grafana
      - prometheus

networks:
  ${NETWORK_NAME}:
    driver: bridge
