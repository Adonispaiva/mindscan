services:
  - type: web
    name: mindscan-api
    env: python
    buildCommand: "pip install -r requirements.deploy.txt"
    startCommand: "uvicorn main:app --host=0.0.0.0 --port=10000"
    rootDir: backend
    runtime: python
    plan: starter
    region: oregon
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mindscan-db
          property: connectionString
