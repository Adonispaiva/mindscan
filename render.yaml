services:
  - type: web
    name: mindscan-talentgpt-api
    env: python
    rootDir: services/talentgpt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # defina no painel do Render

  - type: web
    name: mindscan-talentgpt-web
    env: node
    rootDir: apps/talentgpt
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://mindscan-talentgpt-api.onrender.com
