version: '3.8'

services:
  frontend:
    container_name: frontend-1
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    working_dir: /app
    command: ["npm", "run", "dev"]
    networks:
      - mindscan-network

networks:
  mindscan-network:
    external: true
